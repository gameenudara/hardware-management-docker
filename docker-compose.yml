services:

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: hardware_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./hardware-management-api
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: production
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: hardware_db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # printer-agent runs on the host machine, outside Docker
      PRINTER_AGENT_URL: ${PRINTER_AGENT_URL:-http://host.docker.internal:9977}
      PRINTER_AGENT_TOKEN: ${PRINTER_AGENT_TOKEN}
    extra_hosts:
      # no-op on Docker Desktop (Windows/Mac); required on plain Linux Docker
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./hardware-management-front-end
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mysql_data:
